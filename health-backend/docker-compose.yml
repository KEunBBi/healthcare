services:
  health-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: health-backend-${BACKEND_PORT}:latest
    container_name: health-backend-${BACKEND_PORT}
    restart: unless-stopped
    # 학생별 BACKEND_PORT를 그대로 호스트 포트로 쓰기 때문에 별도 포트 매핑이 필요 없고,
    # 서버에 떠 있는 health-ai(localhost:8000) 등에도 컨테이너 안에서 localhost로 접근할 수 있다.
    network_mode: host
    environment:
      PORT: ${BACKEND_PORT}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      SIMULATOR_WS_URL: ${SIMULATOR_WS_URL}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      # Secret/Variable에 없는 값은 고정값을 사용한다.
      AI_AGENT_BASE_URL: http://localhost:8000
