<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>환자 목록 - Mobile (React Native)</title>
<style>
  /* Tokens sourced from docs/DESIGN-apple.md */
  :root {
    --primary: #0066cc;
    --primary-focus: #0071e3;
    --ink: #1d1d1f;
    --ink-muted-80: #333333;
    --ink-muted-48: #7a7a7a;
    --divider-soft: #f0f0f0;
    --hairline: #e0e0e0;
    --canvas: #ffffff;
    --canvas-parchment: #f5f5f7;
    --on-primary: #ffffff;

    --font-display: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    --font-text: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;

    --radius-pill: 9999px;
    --radius-lg: 18px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    background: #e5e5e7; /* preview backdrop, not part of the screen itself */
    font-family: var(--font-text);
  }

  /* Device frame — presentation aid only, not part of the design system */
  .device {
    width: 390px;
    height: 844px;
    background: var(--ink);
    border-radius: 52px;
    padding: 14px;
  }

  .screen {
    width: 100%;
    height: 100%;
    background: var(--canvas-parchment);
    border-radius: 40px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .status-bar {
    height: 47px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-family: var(--font-text);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }

  .status-bar .icons {
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* header block: title + search + gender filter */
  .header {
    flex-shrink: 0;
    padding: 4px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* typography.display-md-ish scaled for mobile heading */
  .header h1 {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 600;
    line-height: 1.19;
    letter-spacing: -0.28px;
    color: var(--ink);
    margin: 8px 0 0;
  }

  /* components.search-input */
  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-wrap svg {
    position: absolute;
    left: 16px;
    width: 15px;
    height: 15px;
    stroke: var(--ink-muted-48);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
  }

  .search-input {
    width: 100%;
    height: 44px;
    border: 1px solid rgba(0, 0, 0, 0.08);
    border-radius: var(--radius-pill);
    background: var(--canvas);
    padding: 12px 20px 12px 40px;
    font-family: var(--font-text);
    font-size: 15px;
    font-weight: 400;
    letter-spacing: -0.224px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease;
  }

  .search-input::placeholder {
    color: var(--ink-muted-48);
  }

  .search-input:focus {
    border-color: var(--primary-focus);
  }

  /* components.configurator-option-chip — gender filter */
  .chip-row {
    display: flex;
    gap: 8px;
  }

  .chip {
    flex: 1;
    height: 36px;
    border: 1px solid var(--hairline);
    border-radius: var(--radius-pill);
    background: var(--canvas);
    font-family: var(--font-text);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: -0.224px;
    color: var(--ink);
    cursor: pointer;
  }

  /* components.configurator-option-chip-selected */
  .chip.selected {
    border: 2px solid var(--primary-focus);
    font-weight: 600;
    color: var(--primary);
  }

  .chip:active {
    transform: scale(0.95);
  }

  /* list */
  .list {
    flex: 1;
    overflow-y: auto;
    background: var(--canvas);
    margin: 0 12px 12px;
    border: 1px solid var(--hairline);
    border-radius: var(--radius-lg);
  }

  .patient-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--divider-soft);
    cursor: pointer;
  }

  .patient-row:last-child {
    border-bottom: none;
  }

  .patient-row:active {
    background: var(--canvas-parchment);
  }

  .avatar {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: var(--radius-pill);
    background: var(--canvas-parchment);
    border: 1px solid var(--hairline);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-text);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-muted-80);
  }

  .patient-info {
    flex: 1;
    min-width: 0;
  }

  /* typography.body-strong */
  .patient-name {
    font-family: var(--font-text);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.374px;
    color: var(--ink);
    margin: 0 0 3px;
  }

  /* typography.caption */
  .patient-meta {
    font-family: var(--font-text);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: -0.224px;
    color: var(--ink-muted-48);
    margin: 0;
  }

  .patient-meta .gender-badge {
    display: inline-block;
    margin-right: 6px;
    padding: 1px 8px;
    border-radius: var(--radius-pill);
    background: var(--canvas-parchment);
    color: var(--ink-muted-80);
    font-size: 11px;
    font-weight: 600;
  }

  .home-indicator {
    height: 34px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .home-indicator::after {
    content: "";
    width: 134px;
    height: 5px;
    border-radius: var(--radius-pill);
    background: var(--ink);
    opacity: 0.3;
  }
</style>
</head>
<body>
  <div class="device">
    <div class="screen">
      <div class="status-bar">
        <span>9:41</span>
        <span class="icons">•••</span>
      </div>

      <div class="header">
        <h1>환자 목록</h1>
        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input class="search-input" type="text" placeholder="환자 이름 검색">
        </div>
        <div class="chip-row">
          <button class="chip selected" type="button">전체</button>
          <button class="chip" type="button">남</button>
          <button class="chip" type="button">여</button>
        </div>
      </div>

      <div class="list">
        <div class="patient-row">
          <div class="avatar">박</div>
          <div class="patient-info">
            <p class="patient-name">박지훈</p>
            <p class="patient-meta"><span class="gender-badge">남</span>1981.03.14</p>
          </div>
        </div>
        <div class="patient-row">
          <div class="avatar">김</div>
          <div class="patient-info">
            <p class="patient-name">김서연</p>
            <p class="patient-meta"><span class="gender-badge">여</span>1975.11.02</p>
          </div>
        </div>
        <div class="patient-row">
          <div class="avatar">이</div>
          <div class="patient-info">
            <p class="patient-name">이도윤</p>
            <p class="patient-meta"><span class="gender-badge">남</span>1990.06.27</p>
          </div>
        </div>
        <div class="patient-row">
          <div class="avatar">최</div>
          <div class="patient-info">
            <p class="patient-name">최유진</p>
            <p class="patient-meta"><span class="gender-badge">여</span>1988.09.09</p>
          </div>
        </div>
        <div class="patient-row">
          <div class="avatar">정</div>
          <div class="patient-info">
            <p class="patient-name">정민수</p>
            <p class="patient-meta"><span class="gender-badge">남</span>1965.01.30</p>
          </div>
        </div>
        <div class="patient-row">
          <div class="avatar">한</div>
          <div class="patient-info">
            <p class="patient-name">한소희</p>
            <p class="patient-meta"><span class="gender-badge">여</span>1999.04.18</p>
          </div>
        </div>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
