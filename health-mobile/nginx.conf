server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 동적 라우트 /members/:userId — `expo export -p web`은 client-side 라우팅을 위해
    # 이 라우트 하나당 리터럴 파일 members/[userId].html 하나만 정적으로 생성한다(health-web의
    # react-router-dom SPA처럼 모든 경로가 index.html 하나로 통일되는 방식이 아니다). 그래서
    # 새로고침·딥링크로 /members/user_001 같은 실제 경로에 직접 진입할 때는 이 파일로 폴백해야 한다.
    # 폴백 이후의 화면 전환은 expo-router의 client-side 라우팅이 처리한다(ARCHITECTURE.md 7장 SPA).
    location /members/ {
        try_files $uri $uri.html /members/[userId].html;
    }

    # 그 외 라우트(/login, / 등)는 각자의 정적 파일로 서빙하고, 매칭되는 파일이 없으면 index.html로 폴백한다.
    location / {
        try_files $uri $uri.html /index.html;
    }
}
