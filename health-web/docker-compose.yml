services:
  health-web:
    build:
      # 모노레포 루트를 컨텍스트로 써야 ../shared/를 이미지에 포함시킬 수 있다.
      context: ..
      dockerfile: health-web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL}
    image: health-web-${FRONTEND_PORT}:latest
    container_name: health-web-${FRONTEND_PORT}
    restart: unless-stopped
    # 배포 서버의 리버스 프록시가 컨테이너의 Docker 포트 매핑을 보고 라우팅하므로
    # network_mode: host를 쓰지 않고 표준 포트 매핑을 쓴다(호스트의 FRONTEND_PORT -> 컨테이너 80).
    # health-backend에서도 동일한 원인(network_mode: host)으로 502가 나서 이 방식으로 바꿔 해결했다.
    ports:
      - '${FRONTEND_PORT}:80'
