name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'health-backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # health-backend/ 소스를 학생별 고유 경로(BACKEND_PORT 네임스페이스)로 복사한다.
      - name: Copy source to deploy server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SERVER_HOST }}
          port: ${{ vars.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: 'health-backend/*,health-backend/.dockerignore'
          target: '~/deploy/health-backend-${{ vars.BACKEND_PORT }}'
          strip_components: 1
          rm: true

      # 서버에 .env 파일을 만들지 않고, Secrets/Variables를 SSH 세션의 환경변수로 주입해
      # docker compose가 그 값을 그대로 읽어 컨테이너를 기동하도록 한다.
      - name: Build and start container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.SERVER_HOST }}
          port: ${{ vars.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: >-
            BACKEND_PORT,DB_HOST,DB_PORT,DB_NAME,DB_USER,DB_PASSWORD,
            JWT_ACCESS_SECRET,JWT_ACCESS_TTL_SEC,JWT_REFRESH_SECRET,JWT_REFRESH_TTL_SEC,
            SIMULATOR_URL,SIMULATOR_RECONNECT_ATTEMPTS,SIMULATOR_TIMEOUT_MS,SLACK_WEBHOOK_URL
          script: |
            set -e
            cd ~/deploy/health-backend-${BACKEND_PORT}
            docker compose -p health-backend-${BACKEND_PORT} up -d --build
        env:
          BACKEND_PORT: ${{ vars.BACKEND_PORT }}
          DB_HOST: ${{ vars.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_ACCESS_TTL_SEC: ${{ vars.JWT_ACCESS_TTL_SEC }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          JWT_REFRESH_TTL_SEC: ${{ vars.JWT_REFRESH_TTL_SEC }}
          SIMULATOR_URL: ${{ vars.SIMULATOR_URL }}
          SIMULATOR_RECONNECT_ATTEMPTS: ${{ vars.SIMULATOR_RECONNECT_ATTEMPTS }}
          SIMULATOR_TIMEOUT_MS: ${{ vars.SIMULATOR_TIMEOUT_MS }}
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
