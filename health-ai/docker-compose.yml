# health-ai 배포용 docker-compose.
#
# 이 학생에게 배정된 포트(20002, ai002.ys.iranglab.com에 대응)로 고정한다.
# health-backend와 같은 배포 서버·DB를 공유하므로 DB_HOST/DB_PORT/DB_NAME/DB_USER/DB_PASSWORD는
# health-backend와 동일한 GitHub Secrets/Variables(DATABASE_*)를 워크플로우에서 이름만 맞춰 재사용한다.
#
# .env 파일을 만들지 않고, `docker compose up` 을 실행하는 쉘의 환경변수를 ${VAR} 로 치환해서 사용한다.

name: health-ai-20002

services:
  ai:
    build:
      context: .
      dockerfile: Dockerfile
    image: "health-ai-20002:latest"
    container_name: "health-ai-20002"
    restart: unless-stopped
    # 배포 서버의 리버스 프록시가 Docker 포트 매핑을 보고 라우팅하므로 표준 포트 매핑을 쓴다.
    ports:
      - "20002:20002"
    environment:
      PORT: "20002"

      # PostgreSQL (health-backend와 동일 DB)
      DB_HOST: "${DB_HOST:?}"
      DB_PORT: "${DB_PORT:?}"
      DB_NAME: "${DB_NAME:?}"
      DB_USER: "${DB_USER:?}"
      DB_PASSWORD: "${DB_PASSWORD:?}"

      # GitHub Secret/Variable에 없는 값 → 고정값 사용 (docs/DEPLOY.md 참고)
      OLLAMA_BASE_URL: "https://ai.iranglab.com"
      LLM_MODEL: "qwen2.5:3b"
      EMBED_MODEL: "bge-m3"
      EMBEDDING_DIM: "1024"
